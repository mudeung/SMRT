<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supabase 안정 게시판</title>

<style>
body {
  font-family: Arial, sans-serif;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  padding: 12px;
  background: #f7f7f7;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 10px;
  box-sizing: border-box;
}

textarea {
  min-height: 100px;
  resize: none;
}

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #2d6cdf;
  color: white;
  margin-bottom: 10px;
}

button:active {
  transform: scale(0.98);
}

.post {
  background: white;
  border-radius: 12px;
  padding: 14px;
  margin-top: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.post h4 {
  margin: 0 0 8px;
}

.post p {
  margin: 0 0 10px;
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.4;
}

.post div {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.post button {
  width: auto;
  padding: 8px 10px;
  font-size: 14px;
  background: #555;
  margin-right: 6px;
}

.post button:last-child {
  background: #d9534f;
}

.post a {
  display: inline-block;
  margin-top: 8px;
  font-size: 14px;
  padding: 5px 10px;
  border: 1px solid #ccc;
  text-decoration: none;
  border-radius: 6px;
}

/* 📱 모바일 최적화 */
@media (max-width: 480px) {
  body {
    padding: 10px;
  }

  h2 {
    font-size: 20px;
  }

  input, textarea {
    font-size: 15px;
    padding: 12px;
  }

  button {
    font-size: 15px;
    padding: 12px;
  }

  .post {
    padding: 12px;
  }

  .post button {
    width: 48%;
  }
}
</style>
</head>

<body>

<h2>출동기록 게시판</h2>

<input id="title" placeholder="산악사고 위치작성" />
<textarea id="content" placeholder="이름;성별;주소;연락처;응급처치 내용"></textarea>
<input type="file" id="file" />
<button id="createBtn">저장</button>

<hr />

<div id="posts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://rwabtimwveqewhbkvjna.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YWJ0aW13dmVxZXdoYmt2am5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzAyNjEsImV4cCI6MjA5NjMwNjI2MX0.YbJ3pd_3KrttjMwBlRu8zDoLwulfOz-3AONCObkZ8U4";


const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   CREATE POST
========================= */
document.getElementById("createBtn").onclick = async () => {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const file = document.getElementById("file").files[0];

  let fileUrl = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error: uploadError } = await client.storage
      .from("uploads")
      .upload(fileName, file);

    if (uploadError) return alert(uploadError.message);

    const { data } = client.storage
      .from("uploads")
      .getPublicUrl(fileName);

    fileUrl = data.publicUrl;
  }

  await client.from("posts").insert([
    { title, content, file_url: fileUrl }
  ]);

  loadPosts();
};

/* =========================
   LOAD POSTS
========================= */
async function loadPosts() {
  const { data: posts } = await client
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("posts");
  container.innerHTML = "";

  for (const post of posts) {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${post.title}</h3>
      <p>${post.content}</p>
      ${post.file_url ? `<a href="${post.file_url}" target="_blank">파일 다운로드</a>` : ""}
    `;

    // 댓글 영역
    const commentBox = document.createElement("div");
    commentBox.className = "comment-box";

    const input = document.createElement("input");
    input.placeholder = "댓글 작성";

    const btn = document.createElement("button");
    btn.textContent = "댓글";

    const list = document.createElement("div");

    btn.onclick = async () => {
      if (!input.value) return;

      await client.from("comments").insert([
        {
          post_id: post.id,
          content: input.value
        }
      ]);

      input.value = "";
      loadPosts();
    };

    commentBox.appendChild(input);
    commentBox.appendChild(btn);
    commentBox.appendChild(list);

    div.appendChild(commentBox);

    container.appendChild(div);

    // 댓글 로드
    loadComments(post.id, list);
  }
}

/* =========================
   LOAD COMMENTS
========================= */
async function loadComments(postId, container) {
  const { data } = await client
    .from("comments")
    .select("*")
    .eq("post_id", postId)
    .order("created_at", { ascending: true });

  container.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "comment";
    div.textContent = c.content;
    container.appendChild(div);
  });
}

loadPosts();
</script>

</body>
</html>
