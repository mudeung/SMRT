<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Supabase 안정 게시판</title>
<style>
body { font-family: Arial; max-width: 800px; margin: 40px auto; }
input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
button { padding: 6px 10px; margin-right: 5px; }
.post { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
</style>
</head>

<body>

<h2>출동기록 게시판</h2>

<input id="title" placeholder="사고위치 내용" />
<textarea id="content" placeholder="응급처치 내용"></textarea>
<input type="file" id="file" />
<button id="createBtn">등록</button>

<hr />

<div id="posts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://rwabtimwveqewhbkvjna.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YWJ0aW13dmVxZXdoYmt2am5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzAyNjEsImV4cCI6MjA5NjMwNjI2MX0.YbJ3pd_3KrttjMwBlRu8zDoLwulfOz-3AONCObkZ8U4";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   CREATE
========================= */
document.getElementById("createBtn").addEventListener("click", async () => {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const file = document.getElementById("file").files[0];

  let fileUrl = null;

  try {
    if (file) {
      const fileName = Date.now() + "_" + file.name;

      const { error: uploadError } = await client
        .storage
        .from("uploads")
        .upload(fileName, file);

      if (uploadError) return alert(uploadError.message);

      const { data } = client
        .storage
        .from("uploads")
        .getPublicUrl(fileName);

      fileUrl = data.publicUrl;
    }

    const { error } = await client
      .from("posts")
      .insert([{ title, content, file_url: fileUrl }]);

    if (error) return alert(error.message);

    loadPosts();

  } catch (e) {
    alert("에러 발생");
    console.error(e);
  }
});

/* =========================
   READ
========================= */
async function loadPosts() {
  const { data, error } = await client
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) return console.error(error);

  const container = document.getElementById("posts");
  container.innerHTML = "";

  data.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    const title = document.createElement("h4");
    title.textContent = post.title;

    const content = document.createElement("p");
    content.textContent = post.content;

    const btnWrap = document.createElement("div");

    const editBtn = document.createElement("button");
    editBtn.textContent = "수정";
    editBtn.onclick = async () => {
      const newTitle = prompt("제목", post.title);
      const newContent = prompt("내용", post.content);

      if (!newTitle || !newContent) return;

      await client.from("posts")
        .update({ title: newTitle, content: newContent })
        .eq("id", post.id);

      loadPosts();
    };

    const delBtn = document.createElement("button");
    delBtn.textContent = "삭제";
    delBtn.onclick = async () => {
      if (!confirm("삭제?")) return;

      await client.from("posts")
        .delete()
        .eq("id", post.id);

      loadPosts();
    };

    btnWrap.appendChild(editBtn);
    btnWrap.appendChild(delBtn);

    div.appendChild(title);
    div.appendChild(content);

    if (post.file_url) {
  const downloadBtn = document.createElement("a");
  downloadBtn.href = post.file_url;
  downloadBtn.textContent = "⬇ 다운로드";
  downloadBtn.target = "_blank";
  downloadBtn.download = "";

  downloadBtn.style.display = "inline-block";
  downloadBtn.style.marginTop = "5px";
  downloadBtn.style.padding = "5px 10px";
  downloadBtn.style.border = "1px solid #ccc";
  downloadBtn.style.textDecoration = "none";

  div.appendChild(downloadBtn);
}

    div.appendChild(btnWrap);

    container.appendChild(div);
  });
}

loadPosts();
</script>

</body>
</html>
