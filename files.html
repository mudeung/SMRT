<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Supabase 게시판</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; }
    input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { padding: 10px 15px; cursor: pointer; }
    .post { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>게시판</h2>

  <input id="title" placeholder="제목" />
  <textarea id="content" placeholder="내용"></textarea>
  <input type="file" id="file" />
  <button onclick="createPost()">등록</button>

  <hr />

  <h3>게시글 목록</h3>
  <div id="posts"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 🔥 본인 Supabase 정보 입력
    const SUPABASE_URL = "https://laghjfjpqpitxqjhkdlh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhZ2hqZmpwcXBpdHhxamhrZGxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTE4NzgsImV4cCI6MjA5NjEyNzg3OH0.WKC02BiwrGDv7Ttp8NAtf73t0kDSgISpTtiMhWyeKJg";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 게시글 작성 + 파일 업로드
    async function createPost() {
      const title = document.getElementById("title").value;
      const content = document.getElementById("content").value;
      const file = document.getElementById("file").files[0];

      let fileUrl = null;

      // 1. 파일 업로드 (있을 경우)
      if (file) {
        const fileName = `${Date.now()}_${file.name}`;

        const { data, error } = await supabase
          .storage
          .from("uploads")
          .upload(fileName, file);

        if (error) {
          alert("파일 업로드 실패: " + error.message);
          return;
        }

        const { data: publicUrlData } = supabase
          .storage
          .from("uploads")
          .getPublicUrl(fileName);

        fileUrl = publicUrlData.publicUrl;
      }

      // 2. DB 저장
      const { error } = await supabase
        .from("posts")
        .insert([{ title, content, file_url: fileUrl }]);

      if (error) {
        alert("저장 실패: " + error.message);
        return;
      }

      alert("등록 완료!");
      loadPosts();
    }

    // 게시글 목록 불러오기
    async function loadPosts() {
      const { data, error } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const container = document.getElementById("posts");
      container.innerHTML = "";

      data.forEach(post => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
          <h4>${post.title}</h4>
          <p>${post.content}</p>
          ${post.file_url ? `<a href="${post.file_url}" target="_blank">파일 보기</a>` : ""}
          <small>${post.created_at}</small>
        `;

        container.appendChild(div);
      });
    }

    // 초기 로딩
    loadPosts();
  </script>

</body>
</html>
