<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>출동기록 시스템</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
}

.layout {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.left { flex: 4; display: flex; flex-direction: column; gap: 12px; }
.right { flex: 6; }

.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2d6cdf;
  color: white;
  cursor: pointer;
  width: 100%;
  margin-top: 5px;
}

.delete-btn { background: #d9534f; }
.edit-btn { background: #10b981; }
.sms-btn { background: #f59e0b; }

.post {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.time { font-size: 12px; color: gray; margin-bottom: 6px; }

@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .left, .right { width: 100%; flex: unset; }
}
</style>
</head>

<body>

<div class="layout">

<!-- ================= LEFT ================= -->
<div class="left">

  <div class="card">
    <h3>🚑 산악사고 출동기록</h3>

    <select id="accidentCause">
      <option value="">사고원인</option>
      <option value="실족">실족·추락</option>
      <option value="미끄러짐">미끄러짐</option>
      <option value="길잃음">길 잃음</option>
      <option value="체력고갈">체력 저하</option>
      <option value="장비문제">장비 부족/손상</option>
      <option value="낙석">낙석</option>
      <option value="동물">동물/곤충</option>
    </select>

    <select id="accidentType">
      <option value="">사고유형</option>
    </select>

    <input id="accidentLocation" placeholder="사고 위치" />
    <input id="patientStatus" placeholder="환자 상태" />
  </div>

  <div class="card">
    <h3>환자정보</h3>
    <input id="patientName" placeholder="이름" />
    <input id="birth" type="date" />
    <input id="address" placeholder="거주지" />
    <input id="phone" placeholder="연락처" />
  </div>

  <div class="card">
    <h3>응급처치</h3>
    <textarea id="treatment"></textarea>
  </div>

  <div class="card">
    <h3>출동대원</h3>
    <input id="rescueTeam" placeholder="대원 이름" />
  </div>

  <div class="card">
    <h3>파일</h3>
    <input type="file" id="file" />
  </div>

  <button id="createBtn">저장</button>

</div>

<!-- ================= RIGHT ================= -->
<div class="right">
  <div id="posts"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://rwabtimwveqewhbkvjna.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YWJ0aW13dmVxZXdoYmt2am5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzAyNjEsImV4cCI6MjA5NjMwNjI2MX0.YbJ3pd_3KrttjMwBlRu8zDoLwulfOz-3AONCObkZ8U4";


const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= DOM ================= */
const accidentCause = document.getElementById("accidentCause");
const accidentType = document.getElementById("accidentType");
const locationInput = document.getElementById("accidentLocation");

const patientName = document.getElementById("patientName");
const birth = document.getElementById("birth");
const address = document.getElementById("address");
const phone = document.getElementById("phone");

const treatment = document.getElementById("treatment");
const rescueTeam = document.getElementById("rescueTeam");
const fileInput = document.getElementById("file");

const postsContainer = document.getElementById("posts");

/* ================= 사고 매핑 ================= */
const accidentMap = {
  "실족": ["실족·추락", "미끄러짐", "절단·열상", "의식저하", "심정지"],
  "미끄러짐": ["미끄러짐", "실족·추락", "절단·열상"],
  "낙석": ["낙석", "의식저하", "심정지"],
  "길잃음": ["길 잃음", "체력 고갈", "저체온증", "탈수", "의식저하"],
  "체력고갈": ["체력 고갈", "의식저하", "저혈당"],
  "장비문제": ["절단·열상", "실족·추락", "체력 고갈"],
  "동물": ["벌 쏘임", "뱀 물림", "야생동물 공격"]
};

/* ================= 사고 유형 필터 ================= */
accidentCause.addEventListener("change", () => {
  const allowed = accidentMap[accidentCause.value] || [];

  accidentType.innerHTML = `<option value="">사고유형</option>`;

  allowed.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    accidentType.appendChild(opt);
  });
});

/* ================= 문자 공유 ================= */
function shareSMS(post) {
  const text = `
[출동기록]
유형: ${post.accident_type}
위치: ${post.location}
시간: ${new Date(post.created_at).toLocaleString()}

[내용]
${post.content}
  `.trim();

  const encoded = encodeURIComponent(text);
  window.location.href = `sms:?body=${encoded}`;
}

/* ================= 폼 초기화 ================= */
function resetForm() {
  accidentCause.value = "";
  accidentType.innerHTML = `<option value="">사고유형</option>`;
  locationInput.value = "";

  patientName.value = "";
  birth.value = "";
  address.value = "";
  phone.value = "";

  treatment.value = "";
  rescueTeam.value = "";
  fileInput.value = "";
}

/* ================= CREATE ================= */
document.getElementById("createBtn").onclick = async () => {
  try {
    const file = fileInput.files[0];
    let fileUrl = null;

    if (file) {
      const fileName = `${Date.now()}_${file.name}`;

      const { error: uploadError } = await client.storage
        .from("uploads")
        .upload(fileName, file);

      if (uploadError) throw uploadError;

      const { data } = client.storage
        .from("uploads")
        .getPublicUrl(fileName);

      fileUrl = data.publicUrl;
    }

    const payload = {
      accident_type: accidentType.value,
      location: locationInput.value,
      content: `
[환자]
이름: ${patientName.value}
생년월일: ${birth.value}
주소: ${address.value}
연락처: ${phone.value}

[응급처치]
${treatment.value}

[출동대원]
${rescueTeam.value}
      `.trim(),
      file_url: fileUrl
    };

    const { error } = await client.from("posts").insert([payload]);

    if (error) throw error;

    resetForm();
    loadPosts();

  } catch (err) {
    alert(err.message);
  }
};

/* ================= LOAD ================= */
async function loadPosts() {
  const { data } = await client
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  postsContainer.innerHTML = "";

  data.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${post.accident_type || "-"}</h3>
      <div class="time">📍 ${post.location || "-"}</div>
      <div class="time">🕒 ${new Date(post.created_at).toLocaleString()}</div>
      <pre style="white-space:pre-wrap;">${post.content || ""}</pre>
      ${post.file_url ? `<a href="${post.file_url}" target="_blank">파일</a>` : ""}
    `;

    /* 수정 */
    const edit = document.createElement("button");
    edit.textContent = "수정";
    edit.className = "edit-btn";

    edit.onclick = async () => {
      const newType = prompt("유형", post.accident_type);
      const newLoc = prompt("위치", post.location);
      const newContent = prompt("내용", post.content);

      if (!newType || !newLoc) return;

      await client.from("posts")
        .update({
          accident_type: newType,
          location: newLoc,
          content: newContent
        })
        .eq("id", post.id);

      loadPosts();
    };

    /* 삭제 */
    const del = document.createElement("button");
    del.textContent = "삭제";
    del.className = "delete-btn";

    del.onclick = async () => {
      if (!confirm("삭제?")) return;

      await client.from("posts")
        .delete()
        .eq("id", post.id);

      loadPosts();
    };

    /* 문자 */
    const sms = document.createElement("button");
    sms.textContent = "공유";
    sms.className = "sms-btn";

    sms.onclick = () => shareSMS(post);

    div.appendChild(edit);
    div.appendChild(del);
    div.appendChild(sms);

    postsContainer.appendChild(div);
  });
}

loadPosts();
</script>

</body>
</html>
