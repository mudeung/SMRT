<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supabase 게시판 + 시간</title>

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 12px;
  background: #f7f7f7;
}

h2 { text-align: center; }

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2d6cdf;
  color: white;
  cursor: pointer;
  margin-right: 5px;
}

.delete-btn {
  background: #d9534f !important;
  color: white;
}

.post {
  background: white;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
}

.time {
  font-size: 12px;
  color: gray;
  margin-bottom: 6px;
}

.comment {
  font-size: 13px;
  background: #f1f1f1;
  padding: 6px;
  margin-top: 5px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<h2>출동기록 게시판</h2>

<input id="title" placeholder="산악사고 위치작성" />
<textarea id="content" placeholder="내용"></textarea>
<input type="file" id="file" />
<button id="createBtn">저장</button>

<hr />

<div id="posts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://rwabtimwveqewhbkvjna.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YWJ0aW13dmVxZXdoYmt2am5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzAyNjEsImV4cCI6MjA5NjMwNjI2MX0.YbJ3pd_3KrttjMwBlRu8zDoLwulfOz-3AONCObkZ8U4";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   CREATE POST
========================= */
document.getElementById("createBtn").onclick = async () => {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const file = document.getElementById("file").files[0];

  let fileUrl = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await client.storage
      .from("uploads")
      .upload(fileName, file);

    if (error) return alert(error.message);

    const { data } = client.storage
      .from("uploads")
      .getPublicUrl(fileName);

    fileUrl = data.publicUrl;
  }

  await client.from("posts").insert([
    { title, content, file_url: fileUrl }
  ]);

  loadPosts();
};

/* =========================
   LOAD POSTS
========================= */
async function loadPosts() {
  const { data: posts } = await client
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("posts");
  container.innerHTML = "";

  for (const post of posts) {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${post.title}</h3>
      <div class="time">🕒 ${new Date(post.created_at).toLocaleString()}</div>
      <p>${post.content}</p>
      ${post.file_url ? `<a href="${post.file_url}" target="_blank">파일 다운로드</a>` : ""}
    `;

    /* 삭제 버튼 */
    const delPost = document.createElement("button");
    delPost.textContent = "삭제";
    delPost.className = "delete-btn";

    delPost.onclick = async () => {
      if (!confirm("삭제?")) return;

      await client
        .from("posts")
        .delete()
        .eq("id", post.id);

      loadPosts();
    };

    div.appendChild(delPost);

    /* 댓글 입력 */
    const input = document.createElement("input");
    input.placeholder = "추가작성";

    const btn = document.createElement("button");
    btn.textContent = "추가";

    const commentList = document.createElement("div");

    btn.onclick = async () => {
      if (!input.value) return;

      await client.from("comments").insert([
        {
          post_id: post.id,
          content: input.value
        }
      ]);

      input.value = "";
      loadPosts();
    };

    div.appendChild(input);
    div.appendChild(btn);
    div.appendChild(commentList);

    container.appendChild(div);

    loadComments(post.id, commentList);
  }
}

/* =========================
   LOAD COMMENTS
========================= */
async function loadComments(postId, container) {
  const { data } = await client
    .from("comments")
    .select("*")
    .eq("post_id", postId)
    .order("created_at", { ascending: true });

  container.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "comment";

    div.innerHTML = `
      <span>${c.content}</span>
      <small style="color:gray;">
        ${new Date(c.created_at).toLocaleString()}
      </small>
    `;

    container.appendChild(div);
  });
}

loadPosts();
</script>

</body>
</html>
