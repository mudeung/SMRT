<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>출동기록 시스템</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
}

/* ===== 레이아웃 ===== */
.layout {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.left {
  flex: 4;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.right {
  flex: 6;
}

/* 카드 */
.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
}

/* 입력 */
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

/* 버튼 */
button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2d6cdf;
  color: white;
  cursor: pointer;
  width: 100%;
  margin-top: 5px;
}

.delete-btn {
  background: #d9534f;
}

.edit-btn {
  background: #10b981;
}

/* 게시글 */
.post {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* 텍스트 */
.time {
  font-size: 12px;
  color: gray;
  margin-bottom: 6px;
}

/* 모바일 */
@media (max-width: 768px) {
  .layout {
    flex-direction: column;
  }

  .left, .right {
    width: 100%;
    flex: unset;
  }
}
</style>
</head>

<body>

<div class="layout">

  <!-- ================= LEFT INPUT ================= -->
  <div class="left">

    <div class="card">
      <h3>🚑 산악사고 출동기록</h3>

     <select id="accidentType">
  <option value="">사고유형</option>

  <!-- 질환 (Medical) -->
  <optgroup label="질환 (Medical)">
    <option value="심정지">심정지</option>
    <option value="흉통">흉통</option>
    <option value="호흡곤란">호흡곤란</option>
    <option value="뇌졸중 의심">뇌졸중 의심</option>
    <option value="경련">경련</option>
    <option value="의식저하">의식저하</option>
    <option value="저혈당">저혈당</option>
    <option value="고혈당">고혈당</option>
  </optgroup>

  <!-- 외상 (Trauma) -->
  <optgroup label="외상 (Trauma)">
    <option value="실족·추락">실족·추락</option>
    <option value="낙석">낙석</option>
    <option value="미끄러짐">미끄러짐</option>
    <option value="충돌(나무, 바위 등)">충돌(나무, 바위 등)</option>
    <option value="절단·열상">절단·열상</option>
    <option value="등산스틱/장비 손상">등산스틱/장비 손상</option>
  </optgroup>

  <!-- 환경 (Environmental) -->
  <optgroup label="환경 (Environmental)">
    <option value="저체온증">저체온증</option>
    <option value="열탈진">열탈진</option>
    <option value="열사병">열사병</option>
    <option value="탈수">탈수</option>
    <option value="동상">동상</option>
    <option value="번개 손상">번개 손상</option>
  </optgroup>

  <!-- 조난 -->
  <optgroup label="조난·고립 (Stranded)">
    <option value="길 잃음">길 잃음</option>
    <option value="야간 고립">야간 고립</option>
    <option value="체력 고갈">체력 고갈</option>
    <option value="장비 부족">장비 부족</option>
  </optgroup>

  <!-- 동물 -->
  <optgroup label="동물·곤충">
    <option value="벌 쏘임">벌 쏘임</option>
    <option value="뱀 물림">뱀 물림</option>
    <option value="야생동물 공격">야생동물 공격</option>
  </optgroup>
</select>

      <input id="location" placeholder="사고 위치" />
    </div>

    <div class="card">
      <h3>환자정보</h3>
      <input id="patientName" placeholder="이름" />
      <input id="birth" type="date" />
      <input id="address" placeholder="거주지" />
      <input id="phone" placeholder="연락처" />
    </div>

    <div class="card">
      <h3>응급처치</h3>
      <textarea id="treatment"></textarea>
    </div>

    <div class="card">
      <h3>출동대원</h3>
      <input id="rescueTeam" placeholder="대원 이름" />
    </div>

    <div class="card">
      <h3>파일</h3>
      <input type="file" id="file" />
    </div>

    <button id="createBtn">저장</button>

  </div>

  <!-- ================= RIGHT POSTS ================= -->
  <div class="right">
    <div id="posts"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://rwabtimwveqewhbkvjna.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YWJ0aW13dmVxZXdoYmt2am5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzAyNjEsImV4cCI6MjA5NjMwNjI2MX0.YbJ3pd_3KrttjMwBlRu8zDoLwulfOz-3AONCObkZ8U4";


const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   CREATE (DB 분리 반영)
========================= */
document.getElementById("createBtn").onclick = async () => {

  const accidentType = document.getElementById("accidentType").value;
  const location = document.getElementById("location").value;

  const patientName = document.getElementById("patientName").value;
  const birth = document.getElementById("birth").value;
  const address = document.getElementById("address").value;
  const phone = document.getElementById("phone").value;
  const treatment = document.getElementById("treatment").value;
  const rescueTeam = document.getElementById("rescueTeam").value;
  const file = document.getElementById("file").files[0];

  if (!accidentType || !location) {
    alert("사고유형과 위치는 필수");
    return;
  }

  let fileUrl = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await client.storage
      .from("uploads")
      .upload(fileName, file);

    if (error) return alert(error.message);

    const { data } = client.storage
      .from("uploads")
      .getPublicUrl(fileName);

    fileUrl = data.publicUrl;
  }

  const content = `
[환자]
이름: ${patientName}
생년월일: ${birth}
주소: ${address}
연락처: ${phone}

[응급처치]
${treatment}

[출동대원]
${rescueTeam}
  `;

  await client.from("posts").insert([
    {
      accident_type: accidentType,
      location: location,
      content,
      file_url: fileUrl
    }
  ]);

  loadPosts();
};

/* =========================
   LOAD POSTS
========================= */
async function loadPosts() {

  const { data: posts } = await client
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("posts");
  container.innerHTML = "";

  if (!posts) return;

  for (const post of posts) {

    const div = document.createElement("div");
    div.className = "post";

    const time = new Date(post.created_at).toLocaleString("ko-KR", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });

    div.innerHTML = `
      <h3>${post.accident_type}</h3>
      <div class="time">📍 ${post.location}</div>
      <div class="time">🕒 ${time}</div>
      <pre style="white-space:pre-wrap;">${post.content}</pre>
      ${post.file_url ? `<a href="${post.file_url}" target="_blank">파일 다운로드</a>` : ""}
    `;

    /* 삭제 */
    const del = document.createElement("button");
    del.textContent = "삭제";
    del.className = "delete-btn";

    del.onclick = async () => {
      if (!confirm("삭제?")) return;

      await client
        .from("posts")
        .delete()
        .eq("id", post.id);

      loadPosts();
    };

    /* 수정 */
    const edit = document.createElement("button");
    edit.textContent = "수정";
    edit.className = "edit-btn";

    edit.onclick = async () => {

      const newType = prompt("사고유형 수정", post.accident_type);
      if (newType === null) return;

      const newLocation = prompt("위치 수정", post.location);
      if (newLocation === null) return;

      const newContent = prompt("내용 수정", post.content);
      if (newContent === null) return;

      await client
        .from("posts")
        .update({
          accident_type: newType,
          location: newLocation,
          content: newContent
        })
        .eq("id", post.id);

      loadPosts();
    };

    div.appendChild(edit);
    div.appendChild(del);

    container.appendChild(div);
  }
}

loadPosts();
</script>

</body>
</html>
